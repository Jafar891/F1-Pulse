# =============================================================================
# F1-Pulse | SODA Configuration
# File:     soda/configuration.yml
# Author:   Jafar891
# Updated:  2026
#
# Databricks connection config for SODA scans.
# Store credentials in environment variables — never hardcode them here.
#
# Required env vars:
#   DATABRICKS_HOST        e.g. https://adb-xxxx.azuredatabricks.net
#   DATABRICKS_HTTP_PATH   e.g. /sql/1.0/warehouses/xxxx
#   DATABRICKS_TOKEN       Personal access token or service principal secret
# =============================================================================

data_sources:
  f1_pulse_databricks:
    type: spark_df                   # Use spark_df for Databricks SQL Warehouse
    method: databricks
    host: ${DATABRICKS_HOST}
    http_path: ${DATABRICKS_HTTP_PATH}
    token: ${DATABRICKS_TOKEN}
    catalog: f1_pulse                # Unity Catalog name
    schema: silver                   # Default schema (overridden per check file)

soda_cloud:
  host: cloud.soda.io
  api_key_id: ${SODA_CLOUD_API_KEY_ID}       # Optional — remove if not using Soda Cloud
  api_key_secret: ${SODA_CLOUD_API_KEY_SECRET}